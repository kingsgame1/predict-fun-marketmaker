<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>激活 - Predict.fun 做市商</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      font-size: 2rem;
      color: #1f2937;
      margin-bottom: 8px;
    }

    .logo p {
      color: #6b7280;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }

    .message.success {
      background: #d1fae5;
      color: #065f46;
      display: block;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }

    .info {
      margin-top: 24px;
      padding: 16px;
      background: #f3f4f6;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #4b5563;
      line-height: 1.6;
    }

    .info h3 {
      font-size: 0.95rem;
      margin-bottom: 8px;
      color: #1f2937;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading .spinner {
      display: inline-block;
    }

    .loading .btn-text {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>🔐 激活 Predict.fun</h1>
      <p>请输入您的激活码以解锁完整功能</p>
    </div>

    <form id="activationForm">
      <div class="form-group">
        <label for="licenseKey">激活码</label>
        <input
          type="text"
          id="licenseKey"
          placeholder="XXXX-XXXX-XXXX-XXXX-XXXX-XXXX-XXXX-XXXX"
          required
          maxlength="39"
          style="font-family: monospace; text-transform: uppercase;"
        >
      </div>

      <div class="form-group">
        <label for="userId">用户ID</label>
        <input type="text" id="userId" placeholder="your_user_id" required>
      </div>

      <div class="form-group">
        <label for="userName">用户名</label>
        <input type="text" id="userName" placeholder="Your Name" required>
      </div>

      <div class="form-group">
        <label for="email">邮箱</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>

      <button type="submit" class="btn" id="submitBtn">
        <span class="spinner"></span>
        <span class="btn-text">激活</span>
      </button>
    </form>

    <div id="message" class="message"></div>

    <div class="info">
      <h3>💡 获取激活码</h3>
      <p>
        如需购买激活码或申请试用，请联系：<br>
        📧 Email: <a href="mailto:support@predict.fun">support@predict.fun</a><br>
        💬 Telegram: @PredictFunSupport
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById('activationForm');
    const licenseKeyInput = document.getElementById('licenseKey');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');

    // 自动格式化激活码输入
    licenseKeyInput.addEventListener('input', (e) => {
      let value = e.target.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();

      // 每4个字符添加一个连字符
      const formatted = value.match(/.{1,4}/g)?.join('-') || value;
      e.target.value = formatted.substring(0, 39); // XXXX-XXXX-XXXX-XXXX-XXXX-XXXX-XXXX-XXXX
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const licenseKey = licenseKeyInput.value.trim();
      const userId = document.getElementById('userId').value.trim();
      const userName = document.getElementById('userName').value.trim();
      const email = document.getElementById('email').value.trim();

      // 基本验证
      if (!/^[A-F0-9]{4}(?:-[A-F0-9]{4}){7}$/.test(licenseKey)) {
        showMessage('激活码格式无效', 'error');
        return;
      }

      // 显示加载状态
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;
      showMessage('', '');

      try {
        const result = await window.electronAPI.activateLicense(
          licenseKey,
          userId,
          userName,
          email
        );

        if (result.success) {
          showMessage(result.message, 'success');

          // 延迟跳转到主界面
          setTimeout(() => {
            location.href = 'index.html';
          }, 1500);
        } else {
          showMessage(result.message, 'error');
          submitBtn.classList.remove('loading');
          submitBtn.disabled = false;
        }
      } catch (error) {
        showMessage(`激活失败: ${error.message}`, 'error');
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    });

    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = `message ${type}`;
    }
  </script>
</body>
</html>
